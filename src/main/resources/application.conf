##
## VideoToImage -- Application Configuration
## HOCON format. All values are overridable via `-Dkey=value` JVM properties
## or an external `application.conf` placed on the runtime classpath.
##

app {
    name        = "VideoToImage"
    version     = "1.0.0"
    vendor      = "SurajS"
    vendorUrl   = "https://www.linkedin.com/in/shingade-v-s/"
}

extraction {
    ## Frame sampling defaults
    sampling {
        ## Strategy: INTERVAL_FRAMES | INTERVAL_SECONDS | SCENE_CHANGE
        strategy          = "INTERVAL_SECONDS"
        intervalFrames    = 30
        intervalSeconds   = 1.0
    }

    ## Output defaults
    output {
        directory         = ${user.home}"/VideoToImage/output"
        format            = "PNG"              # PNG | JPEG | WEBP
        jpegQuality       = 0.92
        resize {
            enabled       = false
            maxWidth      = 1920
            maxHeight     = 1080
        }
        writeMetadataSidecar = true
    }

    ## Uniqueness / deduplication
    uniqueness {
        ## Sensitivity preset: STRICT | BALANCED | PERMISSIVE
        preset               = "BALANCED"
        ## Sliding-window size for recent-hash comparison
        windowSize           = 32
        ## Hamming distance thresholds per preset (bits out of 64)
        thresholds {
            STRICT           = 3
            BALANCED         = 5
            PERMISSIVE       = 10
        }
        ## Enable secondary SSIM check for borderline Hamming distances
        ssim {
            enabled          = false
            borderlineBand   = 5
            threshold        = 0.92
        }
    }

    ## Hard cap on frames persisted per job (0 = unlimited)
    maxFramesPerJob       = 0
}

concurrency {
    ## Maximum number of videos processed concurrently
    maxParallelJobs       = 2
    ## Worker pool size for per-job CPU-bound stages (0 = Runtime.availableProcessors())
    perJobPoolSize        = 0
}

ai {
    ## AI analyzers are discovered via ServiceLoader. Registered analyzers
    ## are listed here; individual analyzers check their own enabled flag.
    djl {
        enabled           = false
        modelProvider     = "placeholder"     # placeholder | <custom-spi-name>
    }
}

ui {
    theme                 = "FLATLAF_INTELLIJ_DARK"   # FLATLAF_LIGHT | FLATLAF_DARK | FLATLAF_INTELLIJ_DARK | FLATLAF_INTELLIJ_LIGHT
    locale                = "en"
    thumbnail {
        width             = 192
        height            = 108
    }
    logConsole {
        maxLines          = 5000
    }
}

logging {
    level                 = "INFO"
}
